<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- Shield base -->
  <path d="M24 3L6 10.5V24C6 33.6 14.1 42.3 24 45C33.9 42.3 42 33.6 42 24V10.5L24 3Z"
    fill="url(#shield-gradient)" />
  <!-- Shield highlight -->
  <path d="M24 3L6 10.5V24C6 33.6 14.1 42.3 24 45C33.9 42.3 42 33.6 42 24V10.5L24 3Z"
    fill="none" stroke="url(#border-gradient)" stroke-width="1" opacity="0.6" />
  <!-- Radar circle outer -->
  <circle cx="24" cy="24" r="9" stroke="#60a5fa" stroke-width="1.5" fill="none" opacity="0.35" />
  <!-- Radar circle middle -->
  <circle cx="24" cy="24" r="5.5" stroke="#60a5fa" stroke-width="1.5" fill="none" opacity="0.6" />
  <!-- Eye / center dot -->
  <circle cx="24" cy="24" r="3" fill="#ffffff" />
  <circle cx="24" cy="24" r="1.5" fill="#1e40af" />
  <!-- Radar sweep line -->
  <line x1="24" y1="24" x2="24" y2="15" stroke="#93c5fd" stroke-width="1.5" stroke-linecap="round" opacity="0.8" />
  <!-- Pulse arcs -->
  <path d="M30.5 17.5 A9 9 0 0 1 30.5 30.5" stroke="#93c5fd" stroke-width="1" stroke-linecap="round" fill="none" opacity="0.5" />
  <defs>
    <linearGradient id="shield-gradient" x1="6" y1="3" x2="42" y2="45" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1e3a8a" />
      <stop offset="100%" stop-color="#1e40af" />
    </linearGradient>
    <linearGradient id="border-gradient" x1="6" y1="3" x2="42" y2="45" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#60a5fa" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
  </defs>
</svg>
